<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MediVoice — Admin Panel</title>
<link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

<nav>
  <a href="../index.html" class="logo">
    <div class="logo-icon">🏥</div>
    <div class="logo-text">MediVoice</div>
  </a>
  <div class="nav-r">
    <a href="../index.html" class="btn-nav-back">← Bosh sahifa</a>
    <button onclick="logout()" style="padding:8px 16px;border-radius:9px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-sans)">🚪 Chiqish</button>
  </div>
</nav>

<div class="admin-page">
  <div class="admin-header">
    <div>
      <div class="sec-label">Boshqaruv paneli</div>
      <div class="admin-title">Admin Panel</div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button onclick="exportJSON()" style="padding:9px 20px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);color:var(--teal);font-weight:600;cursor:pointer;font-size:14px;font-family:var(--font-sans)">⬇ JSON export</button>
      <button onclick="clearAll()" style="padding:9px 20px;border-radius:10px;border:1.5px solid var(--red);background:#fdf4f4;color:var(--red);font-weight:600;cursor:pointer;font-size:14px;font-family:var(--font-sans)">🗑 Hammasini o'chirish</button>
    </div>
  </div>

  <div class="admin-body">
    <!-- Stats -->
    <div class="admin-stats" id="adminStats"></div>

    <!-- Filters -->
    <div class="filter-bar">
      <input class="search-input" id="searchInput" placeholder="🔍 Fikrlarni qidirish..." oninput="renderList()"/>
      <select class="filter-select" id="filterDept" onchange="renderList()">
        <option value="">Barcha bo'limlar</option>
      </select>
      <select class="filter-select" id="filterSent" onchange="renderList()">
        <option value="">Barcha fikrlar</option>
        <option value="positive">Ijobiy</option>
        <option value="negative">Salbiy</option>
        <option value="neutral">Neytral</option>
      </select>
      <select class="filter-select" id="filterType" onchange="renderList()">
        <option value="">Barcha turlari</option>
        <option value="text">Matnli</option>
        <option value="voice">Ovozli</option>
      </select>
    </div>

    <!-- List -->
    <div class="feedback-list" id="feedbackList"></div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/app.js"></script>
<script>
// Admin auth tekshirish
(function() {
  if (sessionStorage.getItem('medivoice_admin_auth') !== 'true') {
    window.location.replace('login.html');
  }
})();

function logout() {
  sessionStorage.removeItem('medivoice_admin_auth');
  window.location.replace('login.html');
}

initAdmin();
</script>
</body>
</html>
